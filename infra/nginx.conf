# Per-connection upgrade map: "upgrade" when client sent it, empty otherwise.
# Safer than a static "upgrade" header on every response.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: let React Router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + WebSocket proxy. Trailing slashes matter: /api/scan → backend /scan.
    # Upgrade headers let WebSocket endpoints (/api/scan/live) pass through.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
